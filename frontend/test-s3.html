<!DOCTYPE html>
<html>
<head>
    <title>S3 Connection Test</title>
</head>
<body>
    <h1>S3 Connection Test</h1>
    <button onclick="testS3Connection()">Test S3 Connection</button>
    <div id="result"></div>

    <script>
        function testS3Connection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing S3 connection...';
            
            // Test if you can access your S3 bucket
            fetch('https://mealmategroupprojectbucket.s3.amazonaws.com/', {
                method: 'HEAD'
            })
            .then(response => {
                if (response.ok || response.status === 403) {
                    resultDiv.innerHTML = '✅ S3 bucket exists and is accessible';
                } else {
                    resultDiv.innerHTML = '❌ S3 bucket not accessible: ' + response.status;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = '❌ S3 connection failed: ' + error.message;
            });
        }
    </script>
</body>
</html>
