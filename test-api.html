<!DOCTYPE html>
<html>
<head>
    <title>API Connection Test</title>
</head>
<body>
    <h1>API Connection Test</h1>
    <button onclick="testAPI()">Test API Endpoints</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing API endpoints...<br>';
            
            // Test analyze endpoint
            try {
                const response = await fetch('https://008zc5o3r8.execute-api.eu-north-1.amazonaws.com/Prod/analyze', {
                    method: 'OPTIONS'
                });
                resultDiv.innerHTML += `✅ Analyze endpoint accessible (${response.status})<br>`;
            } catch (error) {
                resultDiv.innerHTML += `❌ Analyze endpoint failed: ${error.message}<br>`;
            }
            
            // Test upload endpoint
            try {
                const response = await fetch('https://008zc5o3r8.execute-api.eu-north-1.amazonaws.com/Prod/upload-image', {
                    method: 'OPTIONS'
                });
                resultDiv.innerHTML += `✅ Upload endpoint accessible (${response.status})<br>`;
            } catch (error) {
                resultDiv.innerHTML += `❌ Upload endpoint failed: ${error.message}<br>`;
            }
            
            // Test with actual image data
            const testImageData = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==';
            
            try {
                const response = await fetch('https://008zc5o3r8.execute-api.eu-north-1.amazonaws.com/Prod/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image: testImageData,
                        fileName: 'test.png'
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML += `✅ Analyze API working: ${JSON.stringify(data)}<br>`;
            } catch (error) {
                resultDiv.innerHTML += `❌ Analyze API test failed: ${error.message}<br>`;
            }
        }
    </script>
</body>
</html>
