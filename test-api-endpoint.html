<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Endpoint Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 3px; white-space: pre-wrap; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
        input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>API Endpoint Test</h1>
    <p>Test your API Gateway endpoint: <code>https://008zc5o3r8.execute-api.eu-north-1.amazonaws.com/prod/user/profile</code></p>

    <div class="test-section">
        <h3>Test GET Profile</h3>
        <input type="text" id="getUserId" placeholder="Enter userId" value="test123">
        <button onclick="testGetProfile()">Test GET</button>
        <div id="getResult" class="result"></div>
    </div>

    <div class="test-section">
        <h3>Test PUT Profile</h3>
        <input type="text" id="putUserId" placeholder="userId" value="test123">
        <input type="text" id="putName" placeholder="name" value="Test User">
        <input type="number" id="putAge" placeholder="age" value="25">
        <input type="number" id="putWeight" placeholder="weight" value="70">
        <input type="number" id="putHeight" placeholder="height" value="175">
        <input type="number" id="putCalorieGoal" placeholder="calorieGoal" value="2000">
        <button onclick="testPutProfile()">Test PUT</button>
        <div id="putResult" class="result"></div>
    </div>

    <script>
        async function testGetProfile() {
            const userId = document.getElementById('getUserId').value;
            const resultDiv = document.getElementById('getResult');
            
            try {
                const response = await fetch(`https://008zc5o3r8.execute-api.eu-north-1.amazonaws.com/prod/user/profile?userId=${userId}`);
                const data = await response.text();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `SUCCESS (${response.status}):\n${data}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `ERROR (${response.status}):\n${data}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `NETWORK ERROR:\n${error.message}`;
            }
        }

        async function testPutProfile() {
            const resultDiv = document.getElementById('putResult');
            
            const profileData = {
                userId: document.getElementById('putUserId').value,
                name: document.getElementById('putName').value,
                age: parseInt(document.getElementById('putAge').value),
                weight: parseFloat(document.getElementById('putWeight').value),
                height: parseInt(document.getElementById('putHeight').value),
                calorieGoal: parseInt(document.getElementById('putCalorieGoal').value)
            };
            
            try {
                const response = await fetch(`https://008zc5o3r8.execute-api.eu-north-1.amazonaws.com/prod/user/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(profileData)
                });
                
                const data = await response.text();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `SUCCESS (${response.status}):\n${data}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `ERROR (${response.status}):\n${data}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `NETWORK ERROR:\n${error.message}`;
            }
        }
    </script>
</body>
</html>
